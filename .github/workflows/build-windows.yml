name: Build Windows EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest -q

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyinstaller
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke test Tk interfaces
        shell: pwsh
        run: |
          python -c "import tkinter as tk; from win_automation_picker.app import PickerApp; root = tk.Tk(); root.withdraw(); app = PickerApp(root); app.update_idletasks(); app.destroy(); root.destroy()"
          python -c "from win_automation_picker.ftp_app import RigFtpApp; from win_automation_picker.app import PickerApp; app = RigFtpApp(); editor = PickerApp(app); app.update_idletasks(); editor.update_idletasks(); editor.destroy(); app.destroy()"

      - name: Build integrated AE Workbench executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name AEWorkbench
          --hidden-import serial
          --hidden-import serial.tools.list_ports
          --icon src/win_automation_picker/assets/rig_commander.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/ae_workbench.py

      - name: Build GUI executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name WinAutomationPicker
          --icon src/win_automation_picker/assets/win_automation_picker.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/__main__.py

      - name: Build CLI executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --console
          --name RigCommander
          --hidden-import serial
          --hidden-import serial.tools.list_ports
          --icon src/win_automation_picker/assets/rig_commander.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/rig_commander.py

      - name: Build FTP orchestration executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name RigFtpCommander
          --hidden-import serial
          --hidden-import serial.tools.list_ports
          --icon src/win_automation_picker/assets/rig_commander.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/rig_ftp_commander.py

      - name: Build FTP CLI executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --console
          --name RigFtpCli
          --icon src/win_automation_picker/assets/rig_commander.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/rig_ftp_cli.py

      - name: Smoke test built executables
        shell: pwsh
        run: |
          function Assert-GuiStarts([string]$Path) {
            $process = Start-Process $Path -PassThru
            Start-Sleep -Seconds 5
            if ($process.HasExited) {
              throw "$Path exited during startup with code $($process.ExitCode)"
            }
            Stop-Process -Id $process.Id -Force
          }

          Assert-GuiStarts "dist\AEWorkbench.exe"
          Assert-GuiStarts "dist\WinAutomationPicker.exe"
          Assert-GuiStarts "dist\RigFtpCommander.exe"
          & "dist\RigCommander.exe" --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "RigCommander.exe --help failed" }
          & "dist\RigCommander.exe" device system-check
          if ($LASTEXITCODE -ne 0) { throw "RigCommander.exe device system-check failed" }
          & "dist\RigCommander.exe" firmware --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "RigCommander.exe firmware --help failed" }
          & "dist\RigCommander.exe" device raw-write --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "RigCommander.exe device raw-write --help failed" }
          & "dist\RigFtpCli.exe" --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "RigFtpCli.exe --help failed" }

      - name: Upload executable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-executables
          path: |
            dist/AEWorkbench.exe
            dist/WinAutomationPicker.exe
            dist/RigCommander.exe
            dist/RigFtpCommander.exe
            dist/RigFtpCli.exe
          if-no-files-found: error

  publish-latest-release:
    name: Publish latest release asset
    runs-on: ubuntu-latest
    needs: build-windows
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download executable artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-executables
          path: release

      - name: Move latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push origin latest --force

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest release/AEWorkbench.exe release/WinAutomationPicker.exe release/RigCommander.exe release/RigFtpCommander.exe release/RigFtpCli.exe --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit latest --latest --title "Latest Windows build" --repo "$GITHUB_REPOSITORY"
          else
            gh release create latest release/AEWorkbench.exe release/WinAutomationPicker.exe release/RigCommander.exe release/RigFtpCommander.exe release/RigFtpCli.exe \
              --latest \
              --title "Latest Windows build" \
              --notes "Automatically built Windows executables from the main branch." \
              --repo "$GITHUB_REPOSITORY"
          fi
