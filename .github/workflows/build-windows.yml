name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest -q

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyinstaller
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest -q

      - name: Build GUI executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name WinAutomationPicker
          --icon src/win_automation_picker/assets/win_automation_picker.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/__main__.py

      - name: Build CLI executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --console
          --name RigCommander
          --icon src/win_automation_picker/assets/rig_commander.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/rig_commander.py

      - name: Build FTP orchestration executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name RigFtpCommander
          --icon src/win_automation_picker/assets/rig_commander.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/rig_ftp_commander.py

      - name: Build FTP CLI executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --console
          --name RigFtpCli
          --icon src/win_automation_picker/assets/rig_commander.ico
          --add-data "src/win_automation_picker/assets;win_automation_picker/assets"
          src/win_automation_picker/rig_ftp_cli.py

      - name: Upload executable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-executables
          path: |
            dist/WinAutomationPicker.exe
            dist/RigCommander.exe
            dist/RigFtpCommander.exe
            dist/RigFtpCli.exe
          if-no-files-found: error

  publish-latest-release:
    name: Publish latest release asset
    runs-on: ubuntu-latest
    needs: build-windows
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download executable artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-executables
          path: release

      - name: Move latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push origin latest --force

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest release/WinAutomationPicker.exe release/RigCommander.exe release/RigFtpCommander.exe release/RigFtpCli.exe --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit latest --latest --title "Latest Windows build" --repo "$GITHUB_REPOSITORY"
          else
            gh release create latest release/WinAutomationPicker.exe release/RigCommander.exe release/RigFtpCommander.exe release/RigFtpCli.exe \
              --latest \
              --title "Latest Windows build" \
              --notes "Automatically built Windows executables from the main branch." \
              --repo "$GITHUB_REPOSITORY"
          fi
